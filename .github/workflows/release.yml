name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so shopware-cli can detect the tag

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, libxml, json, intl, zip, gd
          coverage: none
          tools: composer:v2

      - name: Compute version
        id: version
        run: |
          REF="${GITHUB_REF##*/}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION (tag $REF)"

      - name: Sanity check version matches composer.json
        run: |
          COMPOSER_VERSION=$(php -r 'echo json_decode(file_get_contents("composer.json"))->version;')
          if [ "$COMPOSER_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::tag (${{ steps.version.outputs.version }}) and composer.json version ($COMPOSER_VERSION) disagree"
            exit 1
          fi

      - name: Install dev dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Install shopware-cli
        uses: FriendsOfShopware/shopware-cli-action@v1

      - name: Validate extension
        run: shopware-cli extension validate .

      - name: Build release zip
        run: |
          mkdir -p .build
          mv vendor /tmp/_vendor_stash
          shopware-cli extension zip --disable-git --output-directory .build .
          mv /tmp/_vendor_stash vendor
          mv ".build/Coding9AgentReady.zip" \
             ".build/Coding9AgentReady-${{ steps.version.outputs.version }}.zip"
          ls -lah .build/

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "notes<<EOF"
            awk -v v="$VERSION" '
              $0 ~ "^# "v"$" {flag=1; next}
              flag && /^# / {flag=0}
              flag {print}
            ' CHANGELOG_en-GB.md || true
            echo ""
            echo "## Install"
            echo ""
            echo "Download \`Coding9AgentReady-$VERSION.zip\` below, then in your"
            echo "Shopware admin: *Extensions → My extensions → Upload extension*."
            echo ""
            echo "## Verify"
            echo ""
            echo "\`\`\`bash"
            echo "curl -sI https://your-shop.example/ | grep -i '^link:'"
            echo "curl -s https://your-shop.example/.well-known/api-catalog"
            echo "curl -s https://your-shop.example/.well-known/agent-card.json"
            echo "curl -sH 'Accept: text/markdown' https://your-shop.example/ | head"
            echo "curl -s https://your-shop.example/robots.txt"
            echo "\`\`\`"
            echo ""
            echo "## Links"
            echo ""
            echo "- Source: https://github.com/${{ github.repository }}"
            echo "- README: https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/README.md"
            echo "- Changelog: https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/CHANGELOG_en-GB.md"
            echo "- Inspired by https://blog.cloudflare.com/agent-readiness/"
            echo "- Built with https://github.com/Coding9GmbH/shopware-agentic-team"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: .build/Coding9AgentReady-${{ steps.version.outputs.version }}.zip
