name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    name: PHPUnit (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, libxml, json, intl, zip
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        # --ignore-platform-req=php: shopware/core 6.7's transitive deps
        # have moved to PHP 8.4-min in mid-2026 (lcobucci/clock,
        # symfony/var-dumper, doctrine/instantiator, ...). The plugin
        # code itself remains 8.2-compatible; in production the host
        # shop's composer.lock pins compatible older versions, so the
        # install-time php constraint only matters for our isolated
        # fresh-install test matrix. platform-check is off in
        # composer.json so the runtime check does not fire.
        run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-req=php

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  validate:
    runs-on: ubuntu-latest
    name: shopware-cli validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, libxml, json, intl, zip, gd
          coverage: none
      - uses: FriendsOfShopware/shopware-cli-action@v1
      - run: shopware-cli extension validate .
