name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    name: PHPUnit (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, intl, zip
          coverage: none
          tools: composer:v2

      - name: Show environment
        run: |
          php -v
          composer --version
          php -m | sort
          ls -la

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        # See composer.json `config.platform-check`: false. The Shopware 6.7
        # transitive dep tree (lcobucci/clock, symfony/var-dumper, ...) has
        # moved to PHP 8.4-min in mid-2026, but the plugin code itself runs
        # on 8.2+. --ignore-platform-req=php lets composer install on every
        # matrix PHP; the runtime check is disabled in composer.json.
        run: composer install --prefer-dist --no-interaction --ignore-platform-req=php

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  validate:
    runs-on: ubuntu-latest
    name: shopware-cli validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, intl, zip, gd
          coverage: none
      - uses: FriendsOfShopware/shopware-cli-action@v1
      - run: shopware-cli extension validate .
