name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    name: PHPUnit (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, intl, zip
          coverage: none
          tools: composer:v2

      - name: Show environment
        id: env
        run: |
          set -x
          php -v
          composer --version
          php -m | sort
          ls -la
          pwd
        # Always write a file we can read on failure.
        continue-on-error: false

      - name: Validate composer.json
        id: validate
        run: composer validate --no-check-publish 2>&1 | tee /tmp/validate.log

      - name: Install dependencies
        id: install
        run: composer install --prefer-dist --no-interaction --ignore-platform-req=php -vvv 2>&1 | tee /tmp/install.log

      - name: Run PHPUnit
        id: phpunit
        run: vendor/bin/phpunit --testdox 2>&1 | tee /tmp/phpunit.log

      - name: Run PHPStan
        id: phpstan
        run: vendor/bin/phpstan analyse --no-progress 2>&1 | tee /tmp/phpstan.log

      - name: Capture failure log into PR comment
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          PHP_VERSION: ${{ matrix.php }}
        with:
          script: |
            const fs = require('fs');
            const read = (p) => { try { return fs.readFileSync(p, 'utf8'); } catch { return '(no output)'; } };
            const tail = (s, n = 80) => s.split('\n').slice(-n).join('\n');
            const body = [
              `### CI failure — PHP \`${process.env.PHP_VERSION}\``,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `<details><summary>composer validate</summary>`,
              '',
              '```',
              tail(read('/tmp/validate.log')),
              '```',
              '</details>',
              '',
              `<details><summary>composer install (last 80 lines)</summary>`,
              '',
              '```',
              tail(read('/tmp/install.log')),
              '```',
              '</details>',
              '',
              `<details><summary>phpunit (last 80 lines)</summary>`,
              '',
              '```',
              tail(read('/tmp/phpunit.log')),
              '```',
              '</details>',
              '',
              `<details><summary>phpstan (last 40 lines)</summary>`,
              '',
              '```',
              tail(read('/tmp/phpstan.log'), 40),
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  validate:
    runs-on: ubuntu-latest
    name: shopware-cli validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, intl, zip, gd
          coverage: none
      - uses: FriendsOfShopware/shopware-cli-action@v1
      - run: shopware-cli extension validate .
